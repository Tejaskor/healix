<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120">
  <defs>
    <!-- Pill body gradient — white top, gray edges for 3D roundness -->
    <radialGradient id="pg" cx="45%" cy="40%" r="50%" fx="45%" fy="35%">
      <stop offset="0%" stop-color="#fafafa"/>
      <stop offset="50%" stop-color="#f2f2f2"/>
      <stop offset="80%" stop-color="#e0e0e0"/>
      <stop offset="100%" stop-color="#c8c8c8"/>
    </radialGradient>
    <!-- Highlight shimmer on top -->
    <radialGradient id="hl" cx="40%" cy="30%" r="35%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <!-- Drop shadow under the pill -->
    <filter id="ds" x="-20%" y="-10%" width="140%" height="150%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" result="blur"/>
      <feOffset dx="2" dy="6" result="shifted"/>
      <feFlood flood-color="#000" flood-opacity="0.25" result="color"/>
      <feComposite in="color" in2="shifted" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Shadow + pill body -->
  <g filter="url(#ds)">
    <ellipse cx="58" cy="56" rx="38" ry="36" fill="url(#pg)"/>
  </g>
  <!-- Highlight overlay -->
  <ellipse cx="52" cy="48" rx="28" ry="24" fill="url(#hl)"/>
  <!-- Embossed "novo" text -->
  <text x="58" y="62" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="16" font-weight="700" fill="#b8b8b8" letter-spacing="1">novo</text>
</svg>
